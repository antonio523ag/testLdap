<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - ELIS</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container" style="max-width: 640px; margin-top: 8vh;">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h1 class="h4 mb-3">Accesso effettuato</h1>
            <p class="mb-1">
                Benvenuto,
                <strong th:text="${utente != null ? utente.nome + ' ' + utente.cognome : ''}">Nome Cognome</strong>
            </p>
            <p class="text-muted mb-1">
                Email: <span th:text="${utente != null ? utente.emailElis : ''}">email</span>
            </p>
            <p class="text-muted">
                Username LDAP: <span th:text="${utente != null ? utente.usernameLdap : ''}">username</span>
            </p>
            <form th:action="@{/logout}" method="post" class="mt-3">
                <button type="submit" class="btn btn-outline-secondary">Logout</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
